<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Overlay</title>
  <!-- Twitch Extension Helper — только внешний скрипт, без inline (CSP Hosted Test) -->
  <script src="https://extension-files.twitch.tv/helper/v1/twitch-ext.min.js"></script>
  <style>
    * { box-sizing: border-box; }
    body { margin: 0; font-family: system-ui, sans-serif; background: transparent; color: #e0e0e0; }
    #root { min-height: 100vh; }
    .overlay-scroll {
      scrollbar-width: thin;
      scrollbar-color: #555 #252525;
    }
    .overlay-scroll::-webkit-scrollbar { width: 10px; }
    .overlay-scroll::-webkit-scrollbar-track { background: #252525; }
    .overlay-scroll::-webkit-scrollbar-thumb { background: #555; border-radius: 5px; }
    .overlay-scroll::-webkit-scrollbar-thumb:hover { background: #666; }
    .overlay-scroll-x {
      scrollbar-width: thin;
      scrollbar-color: #555 #252525;
    }
    .overlay-scroll-x::-webkit-scrollbar { height: 8px; }
    .overlay-scroll-x::-webkit-scrollbar-track { background: #252525; }
    .overlay-scroll-x::-webkit-scrollbar-thumb { background: #555; border-radius: 4px; }
    .overlay-scroll-x::-webkit-scrollbar-thumb:hover { background: #666; }
  </style>
</head>
<body>
  <div id="root"></div>
  <script type="module" src="./src/main.tsx"></script>
</body>
</html>
